<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="top down football pitch under stadium lights">
  <defs>
    <radialGradient id="lights" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#16402a"/>
      <stop offset="55%" stop-color="#0c2719"/>
      <stop offset="100%" stop-color="#050b14"/>
    </radialGradient>
    <linearGradient id="stripeA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11331f"/>
      <stop offset="100%" stop-color="#0e2c1b"/>
    </linearGradient>
  </defs>

  <!-- night stadium base -->
  <rect width="1200" height="800" fill="url(#lights)"/>

  <!-- mowed stripes -->
  <g opacity="0.45">
    <rect x="0"    y="0" width="150" height="800" fill="#0f2f1d"/>
    <rect x="300"  y="0" width="150" height="800" fill="#0f2f1d"/>
    <rect x="600"  y="0" width="150" height="800" fill="#0f2f1d"/>
    <rect x="900"  y="0" width="150" height="800" fill="#0f2f1d"/>
  </g>

  <!-- glowing pitch markings -->
  <g fill="none" stroke="#39e08a" stroke-width="3" opacity="0.85">
    <rect x="70" y="70" width="1060" height="660" rx="4"/>
    <line x1="600" y1="70" x2="600" y2="730"/>
    <circle cx="600" cy="400" r="92"/>
    <circle cx="600" cy="400" r="4" fill="#39e08a"/>
    <!-- left box -->
    <rect x="70" y="250" width="150" height="300"/>
    <rect x="70" y="330" width="55" height="140"/>
    <!-- right box -->
    <rect x="980" y="250" width="150" height="300"/>
    <rect x="1075" y="330" width="55" height="140"/>
  </g>

  <!-- goal frames (sit outside the pitch line, centered on y=400) -->
  <g fill="none" stroke="#39e08a" stroke-width="3" opacity="0.85">
    <!-- left goal: opening on x=70, back of net at x=56 -->
    <path d="M 70 372 L 56 372 L 56 428 L 70 428"/>
    <!-- right goal: opening on x=1130, back of net at x=1144 -->
    <path d="M 1130 372 L 1144 372 L 1144 428 L 1130 428"/>
  </g>

  <!-- goal net lines (thinner, dimmer, just for texture) -->
  <g fill="none" stroke="#39e08a" stroke-width="1" opacity="0.35">
    <!-- left net: 3 vertical strands inside the goal frame -->
    <line x1="60" y1="372" x2="60" y2="428"/>
    <line x1="63" y1="372" x2="63" y2="428"/>
    <line x1="66" y1="372" x2="66" y2="428"/>
    <!-- right net: 3 vertical strands inside the goal frame -->
    <line x1="1134" y1="372" x2="1134" y2="428"/>
    <line x1="1137" y1="372" x2="1137" y2="428"/>
    <line x1="1140" y1="372" x2="1140" y2="428"/>
  </g>

  <!-- subtle vignette -->
  <rect width="1200" height="800" fill="#050b14" opacity="0.0"/>
</svg>
